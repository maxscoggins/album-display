<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing — Album Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=JetBrains+Mono:wght@400;500;700&family=Baloo+2:wght@500;700;800&family=Rubik+Bubbles&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --panel:#0d0d0d;
    --hairline:#2b2b2b;
    --text:#f2f0ea;
    --text-dim:#9a958a;
    --amber:#ffb020;
    --amber-dim:#5c3d10;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'JetBrains Mono', monospace;
    color:var(--text);
  }

  /* ---------- Blurred full-bleed backdrop — same image, always fills screen ---------- */
  #backdrop{
    position:fixed; inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(70px) saturate(1.3) brightness(0.4);
    transform:scale(1.15);
    transition:background-image 0.5s ease;
    z-index:0;
  }
  #backdrop::after{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 40%, #000 95%);
  }

  /* ---------- Sharp art, sized to the smaller viewport dimension so it
       stays square and dominant. Its own edges fade to transparent via
       mask, revealing the blurred backdrop seamlessly underneath —
       this removes the "framed square in black bars" look on wide
       screens. On a square screen no fade is applied at all (set
       dynamically by updateArtMask() below), so the art runs full
       height/width with no visible edge. ---------- */
  #art-sharp{
    position:fixed;
    top:50%; left:50%;
    width:min(100vh, 100vw);
    height:min(100vh, 100vw);
    transform:translate(-50%, -50%);
    z-index:1;
    overflow:hidden;
  }
  #art-sharp img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  /* faint scanline texture, CRT theme only (see theme block below) */
  #art-sharp::before{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
  }

  /* ---------- Info overlay — layered directly on the art, not stacked
       below it. Its own scrim fades upward so it reads over any
       artwork without needing a solid background. ---------- */
  #info-overlay{
    position:fixed;
    left:50%; bottom:5vh;
    transform:translateX(-50%);
    width:min(78vh, 78vw);
    z-index:3;
    padding:10vh 6px 6px;
  }
  #info-overlay::before{
    content:"";
    position:absolute;
    left:-12%; right:-12%; top:0; bottom:-4vh;
    background:linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.5) 45%, transparent 100%);
    z-index:-1;
    pointer-events:none;
  }

  #title-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:16px;
  }
  #track-title{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:clamp(20px, 3.4vh, 38px);
    text-transform:uppercase;
    letter-spacing:0.02em;
    line-height:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #year{
    font-size:13px;
    color:var(--amber);
    border:1px solid var(--amber-dim);
    padding:3px 8px;
    letter-spacing:0.08em;
    flex-shrink:0;
  }
  #artist-row{
    margin-top:0.6vh;
    font-size:clamp(11px, 1.6vh, 16px);
    color:var(--text-dim);
    letter-spacing:0.05em;
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  #led-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:1.6vh;
  }
  #elapsed, #duration{
    font-size:11px;
    color:var(--text-dim);
    width:38px;
    flex-shrink:0;
  }
  #duration{ text-align:right; }
  #led-track{
    flex:1;
    display:flex;
    gap:2px;
    height:10px;
  }
  .led{
    flex:1;
    background:rgba(255,255,255,0.15);
    border-radius:1px;
  }
  .led.lit{
    background:var(--amber);
    box-shadow:0 0 4px var(--amber);
  }

  #status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:1vh;
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  #play-state span{ color:var(--amber); }

  /* ---------- Theme picker — collapsed to a small icon, pops open ---------- */
  #theme-toggle{
    position:fixed;
    top:18px; right:18px;
    z-index:6;
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(10,10,10,0.55);
    border:1px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity:0.4;
    font-size:14px;
    transition:opacity 0.2s ease, transform 0.15s ease;
  }
  #theme-toggle:hover{ opacity:1; transform:scale(1.06); }
  #theme-menu{
    position:fixed;
    top:56px; right:18px;
    z-index:6;
    background:rgba(12,12,12,0.94);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:10px;
    padding:6px;
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:100px;
    opacity:0;
    transform:translateY(-6px);
    pointer-events:none;
    transition:opacity 0.16s ease, transform 0.16s ease;
  }
  #theme-menu.open{ opacity:1; transform:translateY(0); pointer-events:auto; }
  #theme-menu button{
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    text-align:left;
    padding:7px 9px;
    border-radius:6px;
    cursor:pointer;
  }
  #theme-menu button:hover{ background:rgba(255,255,255,0.06); color:var(--text); }
  #theme-menu button.active{ color:var(--amber); }

  #fs-hint{
    position:fixed;
    bottom:18px; right:22px;
    z-index:2;
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--text-dim);
    text-transform:uppercase;
    cursor:pointer;
    opacity:0.4;
    transition:opacity 0.3s ease;
  }
  #fs-hint:hover{ opacity:1; }

  #reset-link{
    position:fixed;
    bottom:18px; left:22px;
    z-index:2;
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--text-dim);
    text-transform:uppercase;
    cursor:pointer;
    opacity:0.4;
    transition:opacity 0.3s ease;
  }
  #reset-link:hover{ opacity:1; }
  .hidden{ display:none !important; }

  /* ---------- Setup wizard (unchanged: centered modal over everything) ---------- */
  #overlay{
    position:fixed; inset:0;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    background:var(--bg);
    text-align:left;
    padding:24px;
    overflow-y:auto;
  }
  #overlay-content{
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  #step-indicator{ display:flex; gap:6px; text-align:left; }
  .step-dot{ width:26px; height:3px; background:var(--hairline); }
  .step-dot.active{ background:var(--amber); }
  .step-dot.done{ background:var(--amber-dim); }
  #overlay h1{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:26px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    color:var(--amber);
  }
  #overlay .eyebrow{
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  #overlay p{ color:var(--text-dim); font-size:13px; line-height:1.65; }
  #overlay ol{ color:var(--text-dim); font-size:13px; line-height:1.8; padding-left:18px; }
  #overlay ol b{ color:var(--text); }
  #overlay .field-box{
    display:flex; align-items:center; gap:8px;
    background:var(--panel);
    border:1px solid var(--hairline);
    padding:10px 12px;
    font-size:12px;
    word-break:break-all;
  }
  #overlay .field-box code{ flex:1; color:var(--amber); }
  #overlay .field-box button.copy{
    flex-shrink:0;
    border:1px solid var(--hairline);
    background:transparent;
    color:var(--text-dim);
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:6px 10px;
    cursor:pointer;
  }
  #overlay .field-box button.copy:hover{ border-color:var(--amber); color:var(--amber); }
  #overlay input[type="text"]{
    width:100%;
    background:var(--panel);
    border:1px solid var(--hairline);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:11px 12px;
  }
  #overlay input[type="text"]:focus{ outline:none; border-color:var(--amber); }
  #overlay .btn-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  #overlay button{
    background:transparent;
    border:1px solid var(--amber);
    color:var(--amber);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:12px 22px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  #overlay button:hover{ background:var(--amber); color:#000; }
  #overlay button.secondary{ border-color:var(--hairline); color:var(--text-dim); }
  #overlay button.secondary:hover{ background:transparent; border-color:var(--text-dim); color:var(--text); }
  #overlay .link-btn{
    background:none; border:none;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }

  /* =========================================================
     THEME: CRT (default) — amber phosphor, faint scanlines
     ========================================================= */
  body[data-theme="crt"] #art-sharp::before{
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.14) 0px, rgba(0,0,0,0.14) 1px,
      transparent 2px, transparent 3px
    );
    mix-blend-mode:multiply;
  }

  /* =========================================================
     THEME: Y2K / iMac — translucent candy tint, chrome text,
     round candy-dot progress. Same masked art-sharp shape.
     ========================================================= */
  body[data-theme="y2k"] #art-sharp{
    background:linear-gradient(135deg, rgba(58,209,255,0.22), rgba(168,85,247,0.22));
  }
  body[data-theme="y2k"] #art-sharp::before{
    background:radial-gradient(ellipse 70% 40% at 25% 12%, rgba(255,255,255,0.4), transparent 60%);
    mix-blend-mode:overlay;
  }
  body[data-theme="y2k"] #track-title{
    font-family:'Rubik Bubbles', sans-serif;
    font-weight:400;
    letter-spacing:0.01em;
    color:#fdfbff;
    -webkit-text-stroke:1.5px #3d2570;
    text-shadow:
      2px 2px 0 #3d2570,
      3px 3px 0 #3d2570,
      4px 4px 0 #3d2570,
      5px 5px 0 #3d2570;
    transform:skewX(-4deg);
    transform-origin:left bottom;
    display:inline-block;
  }
  body[data-theme="y2k"] #year{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(58,209,255,0.18);
    color:#bfe9ff;
  }
  body[data-theme="y2k"] #artist-row{
    font-family:'Baloo 2', sans-serif;
    font-weight:600;
    letter-spacing:0.02em;
    color:#c9b8ea;
  }
  body[data-theme="y2k"] .led{ border-radius:50%; }
  body[data-theme="y2k"] .led.lit{
    background:linear-gradient(135deg, #3ad1ff, #a855f7);
    box-shadow:0 0 6px rgba(58,209,255,0.8);
  }
  body[data-theme="y2k"] #status-row{ color:#c9b8ea; }
  body[data-theme="y2k"] #play-state span{ color:#3ad1ff; }
</style>
</head>
<body data-theme="crt">

  <div id="backdrop"></div>

  <div id="art-sharp">
    <img id="art-img" src="" alt="">
  </div>

  <div id="info-overlay">
    <div id="title-row">
      <div id="track-title">—</div>
      <div id="year">----</div>
    </div>
    <div id="artist-row">—</div>
    <div id="led-row">
      <div id="elapsed">0:00</div>
      <div id="led-track"></div>
      <div id="duration">0:00</div>
    </div>
    <div id="status-row">
      <div id="play-state">STATUS: <span id="play-state-val">IDLE</span></div>
      <div id="device-name">—</div>
    </div>
  </div>

  <div id="theme-toggle" onclick="toggleThemeMenu(event)">◐</div>
  <div id="theme-menu">
    <button id="theme-btn-crt" onclick="setTheme('crt')">CRT</button>
    <button id="theme-btn-y2k" onclick="setTheme('y2k')">Y2K</button>
  </div>

  <div id="fs-hint" onclick="toggleFullscreen()">[ F ] fullscreen</div>
  <div id="reset-link" class="hidden" onclick="resetSetup()">reset setup</div>

  <div id="overlay">
    <div id="overlay-content"></div>
  </div>

<script>
/* =========================================================
   CONFIG — each person who uses this page (even from the same
   shared link) registers their own free Spotify app and pastes
   in their own Client ID via the wizard below — nothing is
   hardcoded here.
   ========================================================= */
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = "user-read-currently-playing user-read-playback-state";
const POLL_MS = 3000;

function getClientId(){ return localStorage.getItem("spotify_client_id"); }
function setClientId(id){ localStorage.setItem("spotify_client_id", id.trim()); }

/* ---------------- Theme system ---------------- */
/* Add a future theme: one body[data-theme="id"] CSS block above,
   one line here, one button in the #theme-menu markup. */
const THEMES = ["crt", "y2k"];
function applyTheme(id){
  document.body.dataset.theme = id;
  THEMES.forEach(t => document.getElementById("theme-btn-" + t)?.classList.toggle("active", t === id));
}
function setTheme(id){
  applyTheme(id);
  localStorage.setItem("display_theme", id);
  document.getElementById("theme-menu").classList.remove("open");
}
function toggleThemeMenu(e){
  e.stopPropagation();
  document.getElementById("theme-menu").classList.toggle("open");
}
document.addEventListener("click", () => document.getElementById("theme-menu").classList.remove("open"));

/* ---------------- PKCE helpers ---------------- */
function base64UrlEncode(arrayBuffer){
  return btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function generateRandomString(length){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let out = "";
  const values = crypto.getRandomValues(new Uint8Array(length));
  for (let i = 0; i < length; i++) out += chars[values[i] % chars.length];
  return out;
}
async function sha256(plain){
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return crypto.subtle.digest("SHA-256", data);
}

async function login(){
  const clientId = getClientId();
  if (!clientId){ renderWizard("client-id"); return; }

  const verifier = generateRandomString(64);
  sessionStorage.setItem("pkce_verifier", verifier);
  const challenge = base64UrlEncode(await sha256(verifier));

  const params = new URLSearchParams({
    client_id: clientId,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge
  });
  window.location = "https://accounts.spotify.com/authorize?" + params.toString();
}

async function exchangeCodeForToken(code){
  const verifier = sessionStorage.getItem("pkce_verifier");
  const clientId = getClientId();
  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: "authorization_code",
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body
  });
  if (!res.ok) throw new Error("Token exchange failed: " + res.status);
  return res.json();
}

async function refreshToken(){
  const refresh_token = localStorage.getItem("spotify_refresh_token");
  const clientId = getClientId();
  if (!refresh_token || !clientId) return null;
  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: "refresh_token",
    refresh_token
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body
  });
  if (!res.ok) return null;
  const data = await res.json();
  storeTokens(data);
  return data.access_token;
}

function storeTokens(data){
  localStorage.setItem("spotify_access_token", data.access_token);
  localStorage.setItem("spotify_token_expires", Date.now() + (data.expires_in * 1000));
  if (data.refresh_token) localStorage.setItem("spotify_refresh_token", data.refresh_token);
}

async function getValidToken(){
  const expires = Number(localStorage.getItem("spotify_token_expires") || 0);
  let token = localStorage.getItem("spotify_access_token");
  if (!token) return null;
  if (Date.now() > expires - 15000){
    token = await refreshToken();
  }
  return token;
}

/* ---------------- Setup wizard ---------------- */
function copyRedirectUri(){
  navigator.clipboard.writeText(REDIRECT_URI);
  const btn = document.getElementById("copy-uri-btn");
  if (btn){ const old = btn.textContent; btn.textContent = "Copied"; setTimeout(() => btn.textContent = old, 1200); }
}

function renderWizard(step){
  const el = document.getElementById("overlay-content");
  document.getElementById("overlay").classList.remove("hidden");

  if (step === "client-id"){
    el.innerHTML = `
      <div class="eyebrow">Step 1 of 2</div>
      <div id="step-indicator">
        <div class="step-dot active"></div><div class="step-dot"></div>
      </div>
      <h1>Create your Spotify app</h1>
      <p>Every person using this display needs their own free Spotify app —
      it's a 2-minute form, not a real app. Spotify requires the account that
      creates it to have <b style="color:var(--text)">Premium</b> for this to keep working.</p>
      <ol>
        <li>Open the <b>Spotify Developer Dashboard</b> and click <b>Create app</b>.</li>
        <li>Name/description: anything you want.</li>
        <li>Paste this exact <b>Redirect URI</b> into the app's settings:</li>
      </ol>
      <div class="field-box">
        <code>${REDIRECT_URI}</code>
        <button class="copy" id="copy-uri-btn" onclick="copyRedirectUri()">Copy</button>
      </div>
      <div class="btn-row">
        <button onclick="window.open('https://developer.spotify.com/dashboard','_blank')">Open Dashboard</button>
      </div>
      <p style="margin-top:6px;">Then copy the app's <b style="color:var(--text)">Client ID</b> from Settings and paste it below.</p>
      <input type="text" id="client-id-input" placeholder="Paste your Client ID">
      <div class="btn-row">
        <button onclick="submitClientId()">Continue</button>
      </div>
    `;
  }

  if (step === "connect"){
    el.innerHTML = `
      <div class="eyebrow">Step 2 of 2</div>
      <div id="step-indicator">
        <div class="step-dot done"></div><div class="step-dot active"></div>
      </div>
      <h1>Connect your account</h1>
      <p>Log in with the same Spotify account you used to create the app, and
      approve access. This screen shows whatever's currently playing on that
      account, from any device.</p>
      <div class="btn-row">
        <button onclick="login()">Connect Spotify</button>
        <button class="secondary" onclick="submitClientId(true)">Back</button>
      </div>
      <button class="link-btn" onclick="resetSetup()">Start over with a different Client ID</button>
    `;
  }

  if (step === "error"){
    el.innerHTML = `
      <div class="eyebrow">Something went wrong</div>
      <h1>Couldn't connect</h1>
      <p>The connection to Spotify failed. Double check the Redirect URI in
      your app's settings matches exactly, then try again.</p>
      <div class="btn-row">
        <button onclick="renderWizard(getClientId() ? 'connect' : 'client-id')">Try again</button>
      </div>
    `;
  }
}

function submitClientId(skipSave){
  if (!skipSave){
    const val = document.getElementById("client-id-input").value.trim();
    if (!val) return;
    setClientId(val);
  }
  renderWizard("connect");
}

function resetSetup(){
  localStorage.removeItem("spotify_client_id");
  localStorage.removeItem("spotify_access_token");
  localStorage.removeItem("spotify_refresh_token");
  localStorage.removeItem("spotify_token_expires");
  document.getElementById("reset-link").classList.add("hidden");
  renderWizard("client-id");
}

/* ---------------- Boot / auth flow ---------------- */
async function boot(){
  applyTheme(localStorage.getItem("display_theme") || "crt");

  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");

  if (code){
    try {
      const data = await exchangeCodeForToken(code);
      storeTokens(data);
      window.history.replaceState({}, document.title, window.location.pathname);
    } catch (e){
      renderWizard("error");
      return;
    }
  }

  const token = await getValidToken();
  if (!token){
    renderWizard(getClientId() ? "connect" : "client-id");
    return;
  }
  hideOverlay();
  startPolling();
}

function hideOverlay(){
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("reset-link").classList.remove("hidden");
}

/* ---------------- Now playing polling ---------------- */
let lastTrackId = null;

async function pollNowPlaying(){
  const token = await getValidToken();
  if (!token){ renderWizard(getClientId() ? "connect" : "client-id"); return; }

  const res = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
    headers: { Authorization: "Bearer " + token }
  });

  if (res.status === 204){
    setIdleState();
    return;
  }
  if (res.status === 401){
    await refreshToken();
    return;
  }
  if (!res.ok) return;

  const data = await res.json();
  if (!data || !data.item) { setIdleState(); return; }
  renderTrack(data);
}

function setIdleState(){
  document.getElementById("play-state-val").textContent = "PAUSED";
}

function renderTrack(data){
  const item = data.item;
  const artUrl = item.album.images[0]?.url || "";
  const title = item.name;
  const artists = item.artists.map(a => a.name).join(", ");
  const year = (item.album.release_date || "").slice(0, 4);
  const progress = data.progress_ms || 0;
  const duration = item.duration_ms || 1;
  const isPlaying = data.is_playing;
  const deviceName = data.device?.name || "";

  if (item.id !== lastTrackId){
    lastTrackId = item.id;
    document.getElementById("art-img").src = artUrl;
    document.getElementById("backdrop").style.backgroundImage = `url("${artUrl}")`;
    document.getElementById("track-title").textContent = title;
    document.getElementById("artist-row").textContent = artists;
    document.getElementById("year").textContent = year || "----";
    buildLedTrack();
  }

  document.getElementById("play-state-val").textContent = isPlaying ? "PLAYING" : "PAUSED";
  document.getElementById("device-name").textContent = deviceName;
  document.getElementById("elapsed").textContent = formatTime(progress);
  document.getElementById("duration").textContent = formatTime(duration);
  updateLeds(progress / duration);
}

function formatTime(ms){
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return `${min}:${sec.toString().padStart(2, "0")}`;
}

const LED_COUNT = 40;
function buildLedTrack(){
  const track = document.getElementById("led-track");
  track.innerHTML = "";
  for (let i = 0; i < LED_COUNT; i++){
    const led = document.createElement("div");
    led.className = "led";
    track.appendChild(led);
  }
}
function updateLeds(fraction){
  const leds = document.querySelectorAll(".led");
  const litCount = Math.round(fraction * leds.length);
  leds.forEach((led, i) => led.classList.toggle("lit", i < litCount));
}

let pollHandle = null;
function startPolling(){
  pollNowPlaying();
  if (pollHandle) clearInterval(pollHandle);
  pollHandle = setInterval(pollNowPlaying, POLL_MS);
}

/* ---------------- Fullscreen ---------------- */
function toggleFullscreen(){
  if (!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
window.addEventListener("keydown", (e) => {
  if (e.key === "f" || e.key === "F") toggleFullscreen();
});

/* Only fade the art's edges when the screen isn't roughly square —
   on a square-ish monitor (the intended hardware) this stays "none",
   so the art runs completely full-bleed with no visible edge at all. */
function updateArtMask(){
  const el = document.getElementById("art-sharp");
  const w = window.innerWidth, h = window.innerHeight;
  const diff = Math.abs(w - h) / Math.max(w, h);
  let mask = "none";
  if (diff > 0.03){
    mask = (w > h)
      ? "linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%)"
      : "linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%)";
  }
  el.style.maskImage = mask;
  el.style.webkitMaskImage = mask;
}
window.addEventListener("resize", updateArtMask);
updateArtMask();

boot();
</script>
