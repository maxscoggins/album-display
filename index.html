<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Preview — Now Playing Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=JetBrains+Mono:wght@400;500;700&family=Baloo+2:wght@500;700;800&family=Rubik+Bubbles&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --hairline:#2b2b2b;
    --text:#f2f0ea;
    --text-dim:#9a958a;
    --amber:#ffb020;
    --amber-dim:#5c3d10;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'JetBrains Mono', monospace;
    color:var(--text);
  }

  /* ---------- Blurred full-bleed backdrop — same image, always fills screen ---------- */
  #backdrop{
    position:fixed; inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(70px) saturate(1.3) brightness(0.4);
    transform:scale(1.15);
    transition:background 0.4s ease;
    z-index:0;
  }

  /* ---------- Sharp art, sized to the smaller viewport dimension so it
       stays square and dominant. Its own edges fade to transparent via
       mask, revealing the blurred backdrop seamlessly underneath — this
       is what removes the "framed square floating in black" look on
       wide screens. On a square-ish monitor this fade barely shows,
       since the art already fills almost the whole screen. ---------- */
  #art-sharp{
    position:fixed;
    top:50%; left:50%;
    width:min(94vh, 94vw);
    height:min(94vh, 94vw);
    transform:translate(-50%, -50%);
    z-index:1;
    overflow:hidden;
    -webkit-mask-image:radial-gradient(circle at center, black 58%, transparent 90%);
    mask-image:radial-gradient(circle at center, black 58%, transparent 90%);
  }
  #art-sharp .art-fill{
    width:100%; height:100%;
    background-size:cover;
    background-position:center;
    transition:background 0.4s ease;
  }
  /* faint scanline texture, CRT theme only (see theme block below) */
  #art-sharp::before{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
  }

  /* ---------- Info overlay — layered directly on the art, not stacked
       below it. Its own scrim fades upward so it reads over any
       artwork without needing a solid background. ---------- */
  #info-overlay{
    position:fixed;
    left:50%; bottom:5vh;
    transform:translateX(-50%);
    width:min(78vh, 78vw);
    z-index:3;
    padding:10vh 6px 6px;
  }
  #info-overlay::before{
    content:"";
    position:absolute;
    left:-12%; right:-12%; top:0; bottom:-4vh;
    background:linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.5) 45%, transparent 100%);
    z-index:-1;
    pointer-events:none;
  }

  #title-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:16px;
  }
  #track-title{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:clamp(20px, 3.4vh, 38px);
    text-transform:uppercase;
    letter-spacing:0.02em;
    line-height:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #year{
    font-size:13px;
    color:var(--amber);
    border:1px solid var(--amber-dim);
    padding:3px 8px;
    letter-spacing:0.08em;
    flex-shrink:0;
  }
  #artist-row{
    margin-top:0.6vh;
    font-size:clamp(11px, 1.6vh, 16px);
    color:var(--text-dim);
    letter-spacing:0.05em;
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  #led-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:1.6vh;
  }
  #elapsed, #duration{
    font-size:11px;
    color:var(--text-dim);
    width:38px;
    flex-shrink:0;
  }
  #duration{ text-align:right; }
  #led-track{
    flex:1;
    display:flex;
    gap:2px;
    height:10px;
  }
  .led{
    flex:1;
    background:rgba(255,255,255,0.15);
    border-radius:1px;
  }
  .led.lit{
    background:var(--amber);
    box-shadow:0 0 4px var(--amber);
  }

  #status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:1vh;
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  #play-state span{ color:var(--amber); }

  /* ---------- Theme picker — collapsed to a small icon, pops open ---------- */
  #theme-toggle{
    position:fixed;
    top:18px; right:18px;
    z-index:6;
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(10,10,10,0.55);
    border:1px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity:0.4;
    font-size:14px;
    transition:opacity 0.2s ease, transform 0.15s ease;
  }
  #theme-toggle:hover{ opacity:1; transform:scale(1.06); }
  #theme-menu{
    position:fixed;
    top:56px; right:18px;
    z-index:6;
    background:rgba(12,12,12,0.94);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:10px;
    padding:6px;
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:100px;
    opacity:0;
    transform:translateY(-6px);
    pointer-events:none;
    transition:opacity 0.16s ease, transform 0.16s ease;
  }
  #theme-menu.open{ opacity:1; transform:translateY(0); pointer-events:auto; }
  #theme-menu button{
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    text-align:left;
    padding:7px 9px;
    border-radius:6px;
    cursor:pointer;
  }
  #theme-menu button:hover{ background:rgba(255,255,255,0.06); color:var(--text); }
  #theme-menu button.active{ color:var(--amber); }

  #fs-hint{
    position:fixed;
    bottom:18px; right:22px;
    z-index:2;
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--text-dim);
    text-transform:uppercase;
    cursor:pointer;
    opacity:0.4;
    transition:opacity 0.3s ease;
  }
  #fs-hint:hover{ opacity:1; }

  /* ---------- Dev-only preview dock — not part of the real app ---------- */
  #dock{
    position:fixed;
    top:16px; left:50%;
    transform:translateX(-50%);
    z-index:6;
    display:flex;
    gap:8px;
    background:rgba(13,13,13,0.9);
    border:1px solid var(--hairline);
    padding:8px;
    backdrop-filter:blur(6px);
  }
  #dock button{
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:8px 12px;
    cursor:pointer;
  }
  #dock button:hover{ border-color:var(--amber); color:var(--amber); }
  #dock .label{
    font-size:9px;
    color:var(--text-dim);
    letter-spacing:0.1em;
    text-transform:uppercase;
    align-self:center;
    padding:0 4px;
    opacity:0.6;
  }

  /* =========================================================
     THEME: CRT (default) — amber phosphor, faint scanlines
     ========================================================= */
  body[data-theme="crt"] #art-sharp::before{
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.14) 0px, rgba(0,0,0,0.14) 1px,
      transparent 2px, transparent 3px
    );
    mix-blend-mode:multiply;
  }

  /* =========================================================
     THEME: Y2K / iMac — translucent candy tint, chrome text,
     round candy-dot progress. Same masked art-sharp shape.
     ========================================================= */
  body[data-theme="y2k"] #art-sharp{
    background:linear-gradient(135deg, rgba(58,209,255,0.22), rgba(168,85,247,0.22));
  }
  body[data-theme="y2k"] #art-sharp::before{
    background:radial-gradient(ellipse 70% 40% at 25% 12%, rgba(255,255,255,0.4), transparent 60%);
    mix-blend-mode:overlay;
  }
  body[data-theme="y2k"] #track-title{
    font-family:'Rubik Bubbles', sans-serif;
    font-weight:400;
    letter-spacing:0.01em;
    color:#fdfbff;
    -webkit-text-stroke:1.5px #3d2570;
    text-shadow:
      2px 2px 0 #3d2570,
      3px 3px 0 #3d2570,
      4px 4px 0 #3d2570,
      5px 5px 0 #3d2570;
    transform:skewX(-4deg);
    transform-origin:left bottom;
    display:inline-block;
    filter:none;
  }
  body[data-theme="y2k"] #year{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(58,209,255,0.18);
    color:#bfe9ff;
  }
  body[data-theme="y2k"] #artist-row{
    font-family:'Baloo 2', sans-serif;
    font-weight:600;
    letter-spacing:0.02em;
    color:#c9b8ea;
  }
  body[data-theme="y2k"] .led{ border-radius:50%; }
  body[data-theme="y2k"] .led.lit{
    background:linear-gradient(135deg, #3ad1ff, #a855f7);
    box-shadow:0 0 6px rgba(58,209,255,0.8);
  }
  body[data-theme="y2k"] #status-row{ color:#c9b8ea; }
  body[data-theme="y2k"] #play-state span{ color:#3ad1ff; }
</style>
</head>
<body data-theme="crt">

  <div id="dock">
    <span class="label">preview only</span>
    <button onclick="cycleTrack()">Next track ▸</button>
    <button onclick="togglePlay()">Toggle play/pause</button>
    <button onclick="toggleFullscreen()">Fullscreen [F]</button>
  </div>

  <div id="backdrop"></div>

  <div id="art-sharp">
    <div class="art-fill" id="art-fill"></div>
  </div>

  <div id="info-overlay">
    <div id="title-row">
      <div id="track-title">—</div>
      <div id="year">----</div>
    </div>
    <div id="artist-row">—</div>
    <div id="led-row">
      <div id="elapsed">0:00</div>
      <div id="led-track"></div>
      <div id="duration">0:00</div>
    </div>
    <div id="status-row">
      <div id="play-state">STATUS: <span id="play-state-val">PLAYING</span></div>
      <div id="device-name">Living Room</div>
    </div>
  </div>

  <!-- Real app UI: small icon, hidden until tapped -->
  <div id="theme-toggle" onclick="toggleThemeMenu(event)">◐</div>
  <div id="theme-menu">
    <button id="theme-btn-crt" onclick="setTheme('crt')">CRT</button>
    <button id="theme-btn-y2k" onclick="setTheme('y2k')">Y2K</button>
  </div>

  <div id="fs-hint" onclick="toggleFullscreen()">[ F ] fullscreen</div>

<script>
/* Mock data only — nothing here talks to Spotify. Gradients stand
   in for album art so layout/blend can be judged without real images. */
const MOCK_TRACKS = [
  { title: "Nightswim", artist: "Empire of the Sun", year: "2013", duration: 245, gradient: "linear-gradient(135deg,#ff9a3c,#ff3c78)" },
  { title: "A Very Long Song Title That Keeps Going On And On", artist: "The Overly Descriptive Band Name Collective", year: "2019", duration: 312, gradient: "linear-gradient(135deg,#3ca7ff,#7c3cff)" },
  { title: "Blue", artist: "Wave", year: "1998", duration: 178, gradient: "linear-gradient(135deg,#2c3e50,#4ca1af)" },
  { title: "Static & Silence", artist: "Room Tone", year: "2024", duration: 260, gradient: "linear-gradient(135deg,#1a1a1a,#3c3c3c)" }
];

const LED_COUNT = 40;
let trackIndex = 0;
let isPlaying = true;
let progress = 40;

function buildLedTrack(){
  const track = document.getElementById("led-track");
  track.innerHTML = "";
  for (let i = 0; i < LED_COUNT; i++){
    const led = document.createElement("div");
    led.className = "led";
    track.appendChild(led);
  }
}
function formatTime(sec){
  const min = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${min}:${s.toString().padStart(2, "0")}`;
}
function updateLeds(fraction){
  const leds = document.querySelectorAll(".led");
  const lit = Math.round(fraction * leds.length);
  leds.forEach((led, i) => led.classList.toggle("lit", i < lit));
}

function render(){
  const t = MOCK_TRACKS[trackIndex];
  document.getElementById("art-fill").style.background = t.gradient;
  document.getElementById("backdrop").style.background = t.gradient;
  document.getElementById("track-title").textContent = t.title;
  document.getElementById("artist-row").textContent = t.artist;
  document.getElementById("year").textContent = t.year;
  document.getElementById("elapsed").textContent = formatTime(progress);
  document.getElementById("duration").textContent = formatTime(t.duration);
  document.getElementById("play-state-val").textContent = isPlaying ? "PLAYING" : "PAUSED";
  updateLeds(progress / t.duration);
}

function cycleTrack(){
  trackIndex = (trackIndex + 1) % MOCK_TRACKS.length;
  progress = Math.floor(Math.random() * 60);
  render();
}
function togglePlay(){
  isPlaying = !isPlaying;
  render();
}
function toggleFullscreen(){
  if (!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
window.addEventListener("keydown", (e) => {
  if (e.key === "f" || e.key === "F") toggleFullscreen();
});

/* THEMES list — add a future theme by adding its id here plus a
   body[data-theme="id"] CSS block above. Nothing else changes. */
const THEMES = ["crt", "y2k"];
function setTheme(id){
  document.body.dataset.theme = id;
  THEMES.forEach(t => document.getElementById("theme-btn-" + t)?.classList.toggle("active", t === id));
  document.getElementById("theme-menu").classList.remove("open");
}
function toggleThemeMenu(e){
  e.stopPropagation();
  document.getElementById("theme-menu").classList.toggle("open");
}
document.addEventListener("click", () => document.getElementById("theme-menu").classList.remove("open"));

setTheme("crt");
buildLedTrack();
render();
setInterval(() => {
  if (!isPlaying) return;
  const t = MOCK_TRACKS[trackIndex];
  progress = (progress + 1) % t.duration;
  render();
}, 1000);
</script>
</body>
</html>
